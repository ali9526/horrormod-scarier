name: Build HorrorMod

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1

      - name: Build mod jar
        shell: bash
        run: |
          set -o pipefail
          gradle build --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: horrormod-jar
          path: build/libs/*.jar

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Report failure as issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAIL=$(tail -c 50000 build.log)
          gh issue create --title "Build failed: run ${{ github.run_id }}" --body "$TAIL"
